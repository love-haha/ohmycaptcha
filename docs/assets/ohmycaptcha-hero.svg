<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" width="1200" height="630">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0e0d"/>
      <stop offset="50%" style="stop-color:#161310"/>
      <stop offset="100%" style="stop-color:#1a1410"/>
    </linearGradient>

    <!-- Warm glow radial -->
    <radialGradient id="glowCenter" cx="52%" cy="50%" r="55%">
      <stop offset="0%" style="stop-color:#c96a2a;stop-opacity:0.18"/>
      <stop offset="45%" style="stop-color:#a0420f;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#0f0e0d;stop-opacity:0"/>
    </radialGradient>

    <!-- Left accent glow -->
    <radialGradient id="glowLeft" cx="0%" cy="60%" r="50%">
      <stop offset="0%" style="stop-color:#d97a35;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#0f0e0d;stop-opacity:0"/>
    </radialGradient>

    <!-- Orange shimmer gradient for title -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f5c087"/>
      <stop offset="35%" style="stop-color:#e8895a"/>
      <stop offset="70%" style="stop-color:#d4622a"/>
      <stop offset="100%" style="stop-color:#c45a25"/>
    </linearGradient>

    <!-- Card gradient -->
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2118;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#1c1812;stop-opacity:0.95"/>
    </linearGradient>

    <!-- Captcha card gradient -->
    <linearGradient id="captchaCardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f7f4"/>
      <stop offset="100%" style="stop-color:#ede9e2"/>
    </linearGradient>

    <!-- AI card gradient -->
    <linearGradient id="aiCardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2e2215"/>
      <stop offset="100%" style="stop-color:#231a0f"/>
    </linearGradient>

    <!-- Checkbox check gradient -->
    <linearGradient id="checkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a9eff"/>
      <stop offset="100%" style="stop-color:#1a6fd4"/>
    </linearGradient>

    <!-- Token glow -->
    <radialGradient id="tokenGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#e8895a;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#e8895a;stop-opacity:0"/>
    </radialGradient>

    <!-- Clip paths -->
    <clipPath id="mainClip">
      <rect width="1200" height="630" rx="0"/>
    </clipPath>

    <!-- Filter for soft glow on badge -->
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle noise pattern via turbulence -->
    <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="4" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="overlay" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>

    <!-- Glow filter for lines -->
    <filter id="lineGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Dot pattern -->
    <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#4a3520" opacity="0.45"/>
    </pattern>

    <!-- Grid line pattern -->
    <pattern id="grid" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#3a2a18" stroke-width="0.5" opacity="0.4"/>
    </pattern>
  </defs>

  <g clip-path="url(#mainClip)">
    <!-- Base background -->
    <rect width="1200" height="630" fill="url(#bgGrad)"/>

    <!-- Glow layers -->
    <rect width="1200" height="630" fill="url(#glowCenter)"/>
    <rect width="1200" height="630" fill="url(#glowLeft)"/>

    <!-- Subtle dot grid texture -->
    <rect width="1200" height="630" fill="url(#dots)" opacity="0.5"/>

    <!-- Thin grid lines -->
    <rect width="1200" height="630" fill="url(#grid)" opacity="0.3"/>

    <!-- ── Decorative diagonal lines (far left) ── -->
    <g opacity="0.08" filter="url(#lineGlow)">
      <line x1="-40" y1="200" x2="250" y2="630" stroke="#d97a35" stroke-width="0.8"/>
      <line x1="0" y1="200" x2="290" y2="630" stroke="#d97a35" stroke-width="0.5"/>
      <line x1="-80" y1="100" x2="300" y2="630" stroke="#d97a35" stroke-width="0.3"/>
    </g>

    <!-- ── Decorative arc (top-right atmosphere) ── -->
    <circle cx="1100" cy="-80" r="360" fill="none" stroke="#c96a2a" stroke-width="0.6" opacity="0.12"/>
    <circle cx="1100" cy="-80" r="290" fill="none" stroke="#c96a2a" stroke-width="0.4" opacity="0.08"/>
    <circle cx="1100" cy="-80" r="220" fill="none" stroke="#c96a2a" stroke-width="0.3" opacity="0.06"/>

    <!-- ═══════════════════════════════════════════════
         LEFT SECTION — Title + Description
    ══════════════════════════════════════════════════ -->

    <!-- Small label pill -->
    <rect x="80" y="158" width="174" height="28" rx="14" fill="#2a1e11" stroke="#5a3b1a" stroke-width="0.8"/>
    <circle cx="100" cy="172" r="5" fill="#d97a35"/>
    <text x="114" y="177" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#c47840" letter-spacing="1.5">OPEN SOURCE</text>

    <!-- Main title: OhMy -->
    <text x="80" y="265" font-family="'Georgia', 'Times New Roman', serif" font-size="82" font-weight="700" fill="url(#titleGrad)" letter-spacing="-2">OhMy</text>

    <!-- Main title: Captcha — lighter serif -->
    <text x="80" y="348" font-family="'Georgia', 'Times New Roman', serif" font-size="82" font-weight="400" fill="#c8c0b0" letter-spacing="-2">Captcha</text>

    <!-- Divider line -->
    <rect x="80" y="370" width="380" height="1.5" fill="url(#titleGrad)" opacity="0.4" rx="1"/>

    <!-- Description text -->
    <text x="80" y="406" font-family="'Palatino', Georgia, serif" font-size="16" fill="#9a8a72" letter-spacing="0.2">
      Self-hostable · YesCaptcha-Compatible
    </text>
    <text x="80" y="430" font-family="'Palatino', Georgia, serif" font-size="15" fill="#7a6a52" letter-spacing="0.1">
      Built with FastAPI · Playwright · Multimodal AI
    </text>

    <!-- Tech stack badges -->
    <!-- FastAPI badge -->
    <rect x="80" y="458" width="92" height="26" rx="5" fill="#193028" stroke="#1f6050" stroke-width="0.8"/>
    <text x="126" y="476" font-family="'SF Mono', monospace" font-size="10.5" fill="#2ecc9a" text-anchor="middle" letter-spacing="0.5">FastAPI</text>

    <!-- Playwright badge -->
    <rect x="182" y="458" width="96" height="26" rx="5" fill="#1e1a30" stroke="#3a3060" stroke-width="0.8"/>
    <text x="230" y="476" font-family="'SF Mono', monospace" font-size="10.5" fill="#7c74e0" text-anchor="middle" letter-spacing="0.5">Playwright</text>

    <!-- Python badge -->
    <rect x="288" y="458" width="78" height="26" rx="5" fill="#1a2535" stroke="#2a4070" stroke-width="0.8"/>
    <text x="327" y="476" font-family="'SF Mono', monospace" font-size="10.5" fill="#4a9eff" text-anchor="middle" letter-spacing="0.5">Python</text>

    <!-- ═══════════════════════════════════════════════
         RIGHT SECTION — Visual illustration
    ══════════════════════════════════════════════════ -->

    <!-- ── Main dark card (system flow) ── -->
    <rect x="580" y="70" width="540" height="490" rx="20" fill="url(#aiCardGrad)" stroke="#3a2a18" stroke-width="1"/>

    <!-- Card inner highlight border -->
    <rect x="581" y="71" width="538" height="488" rx="19.5" fill="none" stroke="#5a3a1a" stroke-width="0.5" opacity="0.6"/>

    <!-- Card header bar -->
    <rect x="580" y="70" width="540" height="52" rx="20" fill="#231a10"/>
    <rect x="580" y="102" width="540" height="20" fill="#231a10"/>

    <!-- Window dots -->
    <circle cx="614" cy="96" r="6.5" fill="#3a2a1a"/>
    <circle cx="638" cy="96" r="6.5" fill="#3a2a1a"/>
    <circle cx="662" cy="96" r="6.5" fill="#3a2a1a"/>
    <!-- Colored dots -->
    <circle cx="614" cy="96" r="5" fill="#e05c5c" opacity="0.8"/>
    <circle cx="638" cy="96" r="5" fill="#e0a45c" opacity="0.8"/>
    <circle cx="662" cy="96" r="5" fill="#5ce07a" opacity="0.8"/>

    <!-- Window title -->
    <text x="850" y="101" font-family="'SF Mono', monospace" font-size="11" fill="#5a4a35" text-anchor="middle" letter-spacing="0.5">ohmycaptcha · solving pipeline</text>

    <!-- ── CAPTCHA CARD (inside main card) ── -->
    <rect x="616" y="138" width="220" height="130" rx="10" fill="url(#captchaCardGrad)" stroke="#d8d0c4" stroke-width="1"/>

    <!-- reCAPTCHA header -->
    <rect x="616" y="138" width="220" height="36" rx="10" fill="#f0ece4"/>
    <rect x="616" y="158" width="220" height="16" fill="#f0ece4"/>

    <!-- reCAPTCHA logo (simplified) -->
    <circle cx="640" cy="156" r="11" fill="#4a85f5"/>
    <text x="640" y="161" font-family="Arial" font-size="13" font-weight="bold" fill="white" text-anchor="middle">r</text>

    <!-- reCAPTCHA label -->
    <text x="660" y="153" font-family="Arial" font-size="9.5" fill="#555" font-weight="600">reCAPTCHA</text>
    <text x="660" y="165" font-family="Arial" font-size="7.5" fill="#888">Privacy · Terms</text>

    <!-- Checkbox area -->
    <rect x="632" y="183" width="26" height="26" rx="3" fill="white" stroke="#c8c0b0" stroke-width="1.5"/>
    <!-- Checkmark inside -->
    <polyline points="637,196 642,202 651,190" fill="none" stroke="url(#checkGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- "I'm not a robot" text -->
    <text x="668" y="196" font-family="Arial" font-size="13" fill="#333" font-weight="500">I'm not a robot</text>
    <text x="668" y="210" font-family="Arial" font-size="9" fill="#aaa">Certified by reCAPTCHA</text>

    <!-- Bottom bar of captcha card -->
    <rect x="617" y="248" width="218" height="19" rx="0" fill="#e8e4dc" opacity="0.7"/>
    <rect x="617" y="257" width="218" height="10" rx="0" fill="#e8e4dc" opacity="0.5"/>
    <rect x="616" y="248" width="220" height="20" rx="10" fill="none" stroke="#d8d0c4" stroke-width="0.8"/>

    <!-- ── STATUS: SOLVED ── -->
    <rect x="616" y="282" width="220" height="32" rx="8" fill="#1a2e1e" stroke="#2a5030" stroke-width="0.8"/>
    <circle cx="638" cy="298" r="7" fill="#2ecc71" opacity="0.2"/>
    <circle cx="638" cy="298" r="4.5" fill="#2ecc71"/>
    <text x="652" y="302" font-family="'SF Mono', monospace" font-size="10.5" fill="#4ade80" letter-spacing="0.3">CAPTCHA SOLVED</text>

    <!-- ── Arrow connecting to AI card ── -->
    <!-- Connection lines with dots -->
    <line x1="726" y1="314" x2="726" y2="348" stroke="#c96a2a" stroke-width="1.5" opacity="0.5" stroke-dasharray="4,3"/>
    <circle cx="726" cy="348" r="3" fill="#c96a2a" opacity="0.7"/>

    <!-- ── AI Processing Card ── -->
    <rect x="616" y="352" width="220" height="172" rx="10" fill="#1c1510" stroke="#4a3020" stroke-width="1"/>

    <!-- AI card header -->
    <rect x="616" y="352" width="220" height="38" rx="10" fill="#251c12"/>
    <rect x="616" y="375" width="220" height="15" fill="#251c12"/>

    <!-- AI icon -->
    <!-- Hexagonal AI brain icon -->
    <polygon points="640,358 650,363 650,373 640,378 630,373 630,363" fill="#c96a2a" opacity="0.15" stroke="#c96a2a" stroke-width="0.8" opacity="0.6"/>
    <text x="640" y="372" font-family="'SF Mono', monospace" font-size="9" fill="#d97a35" text-anchor="middle">AI</text>

    <text x="660" y="368" font-family="'SF Mono', monospace" font-size="10" fill="#c47840" letter-spacing="0.3">Multimodal Model</text>
    <text x="660" y="382" font-family="'SF Mono', monospace" font-size="8" fill="#6a5035" letter-spacing="0.2">OpenAI-compatible</text>

    <!-- Model processing lines (code-like) -->
    <text x="630" y="408" font-family="'SF Mono', monospace" font-size="9" fill="#5a4030">
      <tspan fill="#7a5a35">→</tspan> ImageToTextTask
    </text>
    <text x="630" y="424" font-family="'SF Mono', monospace" font-size="9" fill="#5a4030">
      <tspan fill="#7a5a35">→</tspan> RecaptchaV3Task
    </text>
    <text x="630" y="440" font-family="'SF Mono', monospace" font-size="9" fill="#5a4030">
      <tspan fill="#7a5a35">→</tspan> analyze_visual()
    </text>

    <!-- Score output -->
    <rect x="628" y="450" width="196" height="28" rx="5" fill="#0f1a25" stroke="#1a3a55" stroke-width="0.8"/>
    <text x="638" y="462" font-family="'SF Mono', monospace" font-size="8" fill="#4a9eff">solution</text>
    <text x="638" y="472" font-family="'SF Mono', monospace" font-size="8" fill="#888"> .gRecaptchaResponse <tspan fill="#2ecc71">✓</tspan></text>

    <!-- ── Right column: API flow ── -->

    <!-- createTask box -->
    <rect x="856" y="138" width="236" height="72" rx="9" fill="#1c2028" stroke="#2a3040" stroke-width="1"/>
    <text x="868" y="158" font-family="'SF Mono', monospace" font-size="9.5" fill="#4a9eff">POST</text>
    <text x="900" y="158" font-family="'SF Mono', monospace" font-size="9.5" fill="#c8c0b0">/createTask</text>
    <rect x="856" y="165" width="236" height="0.8" fill="#2a3040"/>
    <text x="868" y="181" font-family="'SF Mono', monospace" font-size="8.2" fill="#5a6a7a">clientKey:</text>
    <text x="920" y="181" font-family="'SF Mono', monospace" font-size="8.2" fill="#89a050">"your-key"</text>
    <text x="868" y="195" font-family="'SF Mono', monospace" font-size="8.2" fill="#5a6a7a">taskId:</text>
    <text x="908" y="195" font-family="'SF Mono', monospace" font-size="8.2" fill="#c0a060">"uuid-xxxx"</text>

    <!-- Arrow down -->
    <line x1="974" y1="212" x2="974" y2="240" stroke="#3a4a5a" stroke-width="1" stroke-dasharray="4,3"/>
    <polygon points="970,238 974,246 978,238" fill="#3a4a5a"/>

    <!-- getTaskResult box -->
    <rect x="856" y="248" width="236" height="72" rx="9" fill="#1c2028" stroke="#2a3040" stroke-width="1"/>
    <text x="868" y="268" font-family="'SF Mono', monospace" font-size="9.5" fill="#4a9eff">POST</text>
    <text x="900" y="268" font-family="'SF Mono', monospace" font-size="9.5" fill="#c8c0b0">/getTaskResult</text>
    <rect x="856" y="275" width="236" height="0.8" fill="#2a3040"/>
    <text x="868" y="291" font-family="'SF Mono', monospace" font-size="8.2" fill="#5a6a7a">status:</text>
    <text x="905" y="291" font-family="'SF Mono', monospace" font-size="8.2" fill="#2ecc71">"ready"</text>
    <text x="868" y="305" font-family="'SF Mono', monospace" font-size="8.2" fill="#5a6a7a">solution:</text>
    <text x="912" y="305" font-family="'SF Mono', monospace" font-size="8.2" fill="#c0a060">&#123; text: "..." &#125;</text>

    <!-- Arrow down -->
    <line x1="974" y1="322" x2="974" y2="350" stroke="#3a4a5a" stroke-width="1" stroke-dasharray="4,3"/>
    <polygon points="970,348 974,356 978,348" fill="#3a4a5a"/>

    <!-- Health/getBalance box -->
    <rect x="856" y="358" width="236" height="52" rx="9" fill="#1c2028" stroke="#2a3040" stroke-width="1"/>
    <text x="868" y="377" font-family="'SF Mono', monospace" font-size="9.5" fill="#5ce07a">GET</text>
    <text x="900" y="377" font-family="'SF Mono', monospace" font-size="9.5" fill="#c8c0b0">/api/v1/health</text>
    <rect x="856" y="383" width="236" height="0.8" fill="#2a3040"/>
    <text x="868" y="398" font-family="'SF Mono', monospace" font-size="8.2" fill="#5a6a7a">status:</text>
    <text x="905" y="398" font-family="'SF Mono', monospace" font-size="8.2" fill="#2ecc71">"healthy" ✓</text>

    <!-- Decorative floating token glow circles -->
    <circle cx="975" cy="465" r="32" fill="url(#tokenGlow)"/>
    <rect x="856" y="432" width="236" height="48" rx="9" fill="#1c2028" stroke="#2a3040" stroke-width="1"/>
    <text x="868" y="451" font-family="'SF Mono', monospace" font-size="9.5" fill="#e8895a">POST</text>
    <text x="902" y="451" font-family="'SF Mono', monospace" font-size="9.5" fill="#c8c0b0">/getBalance</text>
    <rect x="856" y="457" width="236" height="0.8" fill="#2a3040"/>
    <text x="868" y="472" font-family="'SF Mono', monospace" font-size="8.2" fill="#5a6a7a">balance:</text>
    <text x="910" y="472" font-family="'SF Mono', monospace" font-size="8.2" fill="#c0a060">99999 ∞</text>

    <!-- Connection lines between left and right columns inside card -->
    <line x1="840" y1="174" x2="856" y2="174" stroke="#3a4a5a" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.5"/>
    <line x1="840" y1="284" x2="856" y2="284" stroke="#3a4a5a" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.5"/>

    <!-- ─────────────────────────────────
         BOTTOM: Deployment badges
    ──────────────────────────────────── -->

    <!-- Docker badge -->
    <rect x="616" y="540" width="90" height="24" rx="5" fill="#0d2035" stroke="#1a4060" stroke-width="0.8"/>
    <text x="661" y="556" font-family="'SF Mono', monospace" font-size="9.5" fill="#2496ed" text-anchor="middle" letter-spacing="0.3">🐳 Docker</text>

    <!-- Render badge -->
    <rect x="714" y="540" width="80" height="24" rx="5" fill="#1a1535" stroke="#3a2870" stroke-width="0.8"/>
    <text x="754" y="556" font-family="'SF Mono', monospace" font-size="9.5" fill="#9e7eff" text-anchor="middle" letter-spacing="0.3">Render</text>

    <!-- HuggingFace badge -->
    <rect x="802" y="540" width="128" height="24" rx="5" fill="#2a1e08" stroke="#5a3a10" stroke-width="0.8"/>
    <text x="866" y="556" font-family="'SF Mono', monospace" font-size="9.5" fill="#e8a930" text-anchor="middle" letter-spacing="0.3">🤗 HuggingFace</text>


    <!-- ═══════════════════════════════════════════════
         BOTTOM LEFT — tagline & URL
    ══════════════════════════════════════════════════ -->
    <text x="80" y="570" font-family="'Palatino', Georgia, serif" font-size="13.5" fill="#5a4a35" letter-spacing="0.3">github.com/shenhao-stu/ohmycaptcha</text>

    <!-- Bottom left subtle branding line -->
    <rect x="80" y="580" width="300" height="0.8" fill="#3a2a18" opacity="0.6"/>

    <!-- Version chip bottom left -->
    <rect x="80" y="592" width="120" height="22" rx="11" fill="#231a10" stroke="#4a3520" stroke-width="0.7"/>
    <text x="140" y="607" font-family="'SF Mono', monospace" font-size="9.5" fill="#7a5a38" text-anchor="middle" letter-spacing="0.5">MIT LICENSE</text>

    <!-- Tiny decorative elements -->
    <!-- corner bracket top left -->
    <path d="M 28 28 L 28 52 M 28 28 L 52 28" stroke="#3a2a18" stroke-width="1.5" fill="none" opacity="0.6"/>
    <!-- corner bracket bottom right -->
    <path d="M 1172 602 L 1172 578 M 1172 602 L 1148 602" stroke="#3a2a18" stroke-width="1.5" fill="none" opacity="0.6"/>

  </g>
</svg>
